<!doctype html>
<html lang="es-AR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- ── SEO base ── -->
    <title>Chipo Perfumería — Perfumes árabes y de diseñador 100% originales</title>
    <meta
      name="description"
      content="Perfumes árabes y de diseñador 100% originales en Tucumán. Decants desde 5ml para probar antes de comprar. Envíos a todo el país y atención personal por WhatsApp."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://chipoperfumeria.vercel.app/" />

    <!-- ── Open Graph (WhatsApp, Facebook, Instagram) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chipo Perfumería" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:url" content="https://chipoperfumeria.vercel.app/" />
    <meta property="og:title" content="Chipo Perfumería — Perfumes árabes y de diseñador 100% originales" />
    <meta
      property="og:description"
      content="Perfumes 100% originales en Tucumán. Decants desde 5ml para probar antes de comprar. Envíos a todo el país."
    />
    <meta property="og:image" content="https://chipoperfumeria.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ── Twitter/X ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chipo Perfumería — Perfumes 100% originales" />
    <meta
      name="twitter:description"
      content="Perfumes árabes y de diseñador originales en Tucumán. Decants desde 5ml. Envíos a todo el país."
    />
    <meta name="twitter:image" content="https://chipoperfumeria.vercel.app/og-image.jpg" />

    <!-- ── Datos estructurados: le dice a Google que sos una tienda ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Chipo Perfumería",
        "description": "Perfumes árabes y de diseñador 100% originales. Decants desde 5ml. Envíos a todo el país.",
        "url": "https://chipoperfumeria.vercel.app/",
        "logo": "https://chipoperfumeria.vercel.app/chipo-logo.svg",
        "image": "https://chipoperfumeria.vercel.app/og-image.jpg",
        "priceRange": "$$",
        "currenciesAccepted": "ARS",
        "paymentAccepted": "Efectivo, Transferencia bancaria",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "San Miguel de Tucumán",
          "addressRegion": "Tucumán",
          "addressCountry": "AR"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Argentina"
        }
      }
    </script>

    <!-- Google Fonts — Playfair Display (títulos elegantes) + Inter (cuerpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
